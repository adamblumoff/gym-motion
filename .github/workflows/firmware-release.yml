name: Firmware Release

on:
  workflow_dispatch:
    inputs:
      version:
        description: Firmware version to publish (for example 0.4.2)
        required: true
      rollout_state:
        description: Rollout state to register in the API
        required: false
        default: active
  push:
    tags:
      - "firmware-v*"

env:
  CI_NODE_VERSION: 25.8.0
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  build-firmware:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    env:
      API_URL: ${{ secrets.API_URL }}
      AWS_ACCESS_KEY_ID: ${{ secrets.AWS_ACCESS_KEY_ID }}
      AWS_SECRET_ACCESS_KEY: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
      AWS_ENDPOINT_URL: ${{ secrets.AWS_ENDPOINT_URL }}
      AWS_DEFAULT_REGION: ${{ secrets.AWS_DEFAULT_REGION }}
      AWS_S3_BUCKET_NAME: ${{ secrets.AWS_S3_BUCKET_NAME }}

    steps:
      - name: Check out repo
        uses: actions/checkout@v5

      - name: Set up Node.js
        uses: actions/setup-node@v6
        with:
          node-version: ${{ env.CI_NODE_VERSION }}
          package-manager-cache: false

      - name: Resolve firmware version
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            echo "FIRMWARE_VERSION=${{ github.event.inputs.version }}" >> "$GITHUB_ENV"
            echo "ROLLOUT_STATE=${{ github.event.inputs.rollout_state }}" >> "$GITHUB_ENV"
          else
            echo "FIRMWARE_VERSION=${GITHUB_REF_NAME#firmware-v}" >> "$GITHUB_ENV"
            echo "ROLLOUT_STATE=active" >> "$GITHUB_ENV"
          fi

      - name: Install Arduino CLI
        run: ./scripts/install-arduino-cli.sh

      - name: Install Adafruit nrfutil
        run: ./scripts/install-adafruit-nrfutil.sh

      - name: Set up Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Install app dependencies
        run: bun install --frozen-lockfile

      - name: Install Seeed nRF52 core
        run: |
          arduino-cli config init --overwrite
          arduino-cli config add board_manager.additional_urls https://files.seeedstudio.com/arduino/package_seeeduino_boards_index.json
          arduino-cli core update-index
          arduino-cli core install Seeeduino:nrf52

      - name: Build firmware artifact
        run: ./scripts/build-firmware.sh

      - name: Generate checksums
        run: |
          cd build/firmware
          for file in *.zip; do
            sha256sum "$file" > "$file.sha256"
            md5sum "$file" > "$file.md5"
          done

      - name: Upload firmware artifact
        uses: actions/upload-artifact@v4
        with:
          name: gym-motion-firmware-${{ env.FIRMWARE_VERSION }}
          path: build/firmware

      - name: Publish firmware to Railway bucket and API
        run: |
          bun run firmware:publish -- --version "$FIRMWARE_VERSION" --rollout "$ROLLOUT_STATE"
