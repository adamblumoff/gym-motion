name: CI

on:
  pull_request:
  push:

env:
  CI_NODE_VERSION: 25.8.0
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  changes:
    runs-on: ubuntu-latest
    outputs:
      ts: ${{ steps.filter.outputs.ts }}
      backend_db: ${{ steps.filter.outputs.backend_db }}
      windows_desktop: ${{ steps.filter.outputs.windows_desktop }}
      linux_gateway: ${{ steps.filter.outputs.linux_gateway }}
      firmware: ${{ steps.filter.outputs.firmware }}

    steps:
      - name: Check out repo
        uses: actions/checkout@v5

      - name: Detect changed areas
        id: filter
        uses: dorny/paths-filter@v3
        with:
          filters: |
            ts:
              - "backend/**/*.ts"
              - "desktop/**/*.ts"
              - "desktop/**/*.tsx"
              - "shared/**/*.ts"
              - "scripts/**/*.ts"
              - "*.config.ts"
              - "package.json"
              - "bun.lock"
              - "tsconfig.json"
              - "tsconfig.runtime.json"
              - "vitest.config.ts"
              - ".github/workflows/ci.yml"
            backend_db:
              - "backend/**"
              - "shared/**"
              - "package.json"
              - "bun.lock"
              - "drizzle.config.ts"
              - "tsconfig.runtime.json"
              - "vitest.db.config.ts"
              - ".github/workflows/ci.yml"
            windows_desktop:
              - "desktop/**"
              - "backend/**"
              - "shared/**"
              - "native/windows-dotnet-ble-sidecar/**"
              - "package.json"
              - "bun.lock"
              - "electron-builder.config.mjs"
              - "playwright.desktop.config.ts"
              - "tsconfig.json"
              - "tsconfig.runtime.json"
              - "scripts/build-windows-ble-sidecar.mjs"
              - "scripts/build-windows-ble-sidecar-if-needed.mjs"
              - ".github/workflows/ci.yml"
            linux_gateway:
              - "native/linux-dotnet-ble-gateway/**"
              - "scripts/linux-gateway/**"
              - "package.json"
              - "bun.lock"
              - ".github/workflows/ci.yml"
            firmware:
              - "firmware/**"
              - "scripts/build-firmware.sh"
              - "scripts/install-arduino-cli.sh"
              - "scripts/test-firmware-host.py"
              - "package.json"
              - "bun.lock"
              - ".github/workflows/ci.yml"

  ts-fast:
    needs: changes
    if: needs.changes.outputs.ts == 'true'
    runs-on: ubuntu-latest

    steps:
      - name: Check out repo
        uses: actions/checkout@v5

      - name: Set up Node.js
        uses: actions/setup-node@v6
        with:
          node-version: ${{ env.CI_NODE_VERSION }}
          package-manager-cache: false

      - name: Set up Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Lint
        run: bun run lint

      - name: Typecheck
        run: bun run typecheck

      - name: Boundary checks
        run: bun run test:boundaries

      - name: Run TS and JS tests
        run: bun run test:ts

  backend-db:
    needs: changes
    if: needs.changes.outputs.backend_db == 'true'
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_DB: gym_motion_test
          POSTGRES_PASSWORD: postgres
          POSTGRES_USER: postgres
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U postgres -d gym_motion_test"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    env:
      DATABASE_PUBLIC_URL: postgres://postgres:postgres@127.0.0.1:5432/gym_motion_test

    steps:
      - name: Check out repo
        uses: actions/checkout@v5

      - name: Set up Node.js
        uses: actions/setup-node@v6
        with:
          node-version: ${{ env.CI_NODE_VERSION }}
          package-manager-cache: false

      - name: Set up Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Run backend DB integration tests
        run: bun run test:backend:db

  linux-gateway:
    needs: changes
    if: needs.changes.outputs.linux_gateway == 'true'
    runs-on: ubuntu-latest

    steps:
      - name: Check out repo
        uses: actions/checkout@v5

      - name: Set up .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 10.0.x

      - name: Build Linux gateway
        run: dotnet build native/linux-dotnet-ble-gateway/GymMotion.LinuxBleGateway.csproj --configuration Release

  windows-desktop:
    needs: changes
    if: needs.changes.outputs.windows_desktop == 'true'
    runs-on: windows-latest

    steps:
      - name: Check out repo
        uses: actions/checkout@v5

      - name: Set up Node.js
        uses: actions/setup-node@v6
        with:
          node-version: ${{ env.CI_NODE_VERSION }}
          package-manager-cache: false

      - name: Set up Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Set up .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 9.0.x

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Run desktop end-to-end tests
        run: bun run test:e2e:desktop

  firmware-build:
    needs: changes
    if: needs.changes.outputs.firmware == 'true'
    runs-on: ubuntu-latest

    steps:
      - name: Check out repo
        uses: actions/checkout@v5

      - name: Set up Node.js
        uses: actions/setup-node@v6
        with:
          node-version: ${{ env.CI_NODE_VERSION }}
          package-manager-cache: false

      - name: Set up Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Install Arduino CLI
        run: ./scripts/install-arduino-cli.sh

      - name: Install Seeed nRF52 core
        run: |
          arduino-cli config init --overwrite
          arduino-cli config add board_manager.additional_urls https://files.seeedstudio.com/arduino/package_seeeduino_boards_index.json
          arduino-cli core update-index
          arduino-cli core install Seeeduino:nrf52

      - name: Build firmware
        run: bun run firmware:build

  firmware-host-tests:
    needs: changes
    if: needs.changes.outputs.firmware == 'true'
    runs-on: ubuntu-latest

    steps:
      - name: Check out repo
        uses: actions/checkout@v5

      - name: Set up Node.js
        uses: actions/setup-node@v6
        with:
          node-version: ${{ env.CI_NODE_VERSION }}
          package-manager-cache: false

      - name: Set up Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Install host test compiler
        run: sudo apt-get update && sudo apt-get install -y g++

      - name: Run firmware host tests
        run: bun run firmware:test:host
