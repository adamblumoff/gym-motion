[platformio]
default_envs = host-tests
src_dir = .

; The active firmware targets in this repo are Seeed XIAO nRF52840 boards and
; are built with the repo's Arduino CLI scripts, not PlatformIO.
; Keep this file only for native host tests so it does not suggest an ESP32 path.
[env:host-tests]
platform = native
test_framework = doctest
build_src_filter =
  -<*.ino>
  +<runtime_host_protocol.cpp>
  +<host_tests/*.cpp>
