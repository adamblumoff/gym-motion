[platformio]
default_envs = esp32dev
src_dir = .

[env:esp32dev]
platform = espressif32
board = esp32dev
framework = arduino
monitor_speed = 115200
upload_speed = 921600
board_build.filesystem = spiffs
board_build.partitions = min_spiffs.csv
build_src_filter =
  +<*.ino>
  +<*.c>
  +<*.cpp>
  +<*.h>
  +<*.hpp>

[env:host-tests]
platform = native
test_framework = doctest
build_src_filter =
  -<*.ino>
  +<runtime_host_protocol.cpp>
  +<host_tests/*.cpp>
